# Docker secrets overlay - example for production deployments that prefer
# file-mounted secrets over plain env vars in `.env`.
#
# Usage:
#   1. Create the secret files (mode 0600, owned by root) on the host:
#      mkdir -p ./secrets && chmod 700 ./secrets
#      openssl rand -base64 24 > ./secrets/db_password.txt
#      openssl rand -base64 48 > ./secrets/jwt_secret.txt
#      printf 'YourBootstrapPassword!2026' > ./secrets/initial_admin_password.txt
#      chmod 600 ./secrets/*.txt
#
#   2. Remove DB_PASSWORD, JWT_SECRET, INITIAL_ADMIN_PASSWORD from your `.env`
#      (or leave them empty - they would override the file-loaded values).
#
#   3. Bring up the stack with both compose files:
#      docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
#
# How it works:
#   The backend container reads `${VAR}_FILE` env vars on startup
#   (`node/utils/secrets.js::loadSecretsFromFiles`) and resolves them to
#   the underlying secret value before any other module runs. This is the
#   standard convention used by official postgres / mysql / redis images.
#
# For Vault / cloud secret managers, mount the secret as a file via your
# orchestration layer (k8s projected volume, ECS secret, etc.) and point
# the same `*_FILE` env vars at the mount path.

services:
  db:
    environment:
      # Postgres official image natively supports the *_FILE convention
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      # Unset the plain env var so the FILE variant is used
      POSTGRES_PASSWORD: ""
    secrets:
      - db_password

  backend:
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password
      DB_PASSWORD: ""
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_SECRET: ""
      INITIAL_ADMIN_PASSWORD_FILE: /run/secrets/initial_admin_password
      INITIAL_ADMIN_PASSWORD: ""
    secrets:
      - db_password
      - jwt_secret
      - initial_admin_password

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  initial_admin_password:
    file: ./secrets/initial_admin_password.txt
