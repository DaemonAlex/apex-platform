# APEX Platform - Docker Compose
# Three services: PostgreSQL 16, Express backend, nginx web tier.
# Configure via .env (copy from .env.example).

services:
  db:
    image: postgres:16-alpine
    container_name: apex-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-apex_db}
      POSTGRES_USER: ${DB_USERNAME:-apex_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - apex-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-apex_user} -d ${DB_DATABASE:-apex_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apex-net

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: apex-backend:latest
    container_name: apex-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TLS_MIN_VERSION: ${TLS_MIN_VERSION:-TLSv1.2}
      # --- Database (defaults point at the in-stack `db` service) ---
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-apex_db}
      DB_USERNAME: ${DB_USERNAME:-apex_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_IDLE_MS: ${DB_POOL_IDLE_MS:-30000}
      DB_CONNECT_TIMEOUT_MS: ${DB_CONNECT_TIMEOUT_MS:-10000}
      # --- Database TLS (set DB_SSL=true for managed/external PostgreSQL) ---
      DB_SSL: ${DB_SSL:-false}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-true}
      DB_SSL_CA: ${DB_SSL_CA:-}
      DB_SSL_CERT: ${DB_SSL_CERT:-}
      DB_SSL_KEY: ${DB_SSL_KEY:-}
      # --- Auth (v9.0 — RS256 cookies + HS256 legacy fallback) ---
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_PRIVATE_KEY_FILE: ${JWT_PRIVATE_KEY_FILE:-/app/secrets/jwt_private.pem}
      JWT_PUBLIC_KEY_FILE: ${JWT_PUBLIC_KEY_FILE:-/app/secrets/jwt_public.pem}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-14}
      # --- Session cookies ---
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      # --- TOTP 2FA ---
      TOTP_ENC_KEY: ${TOTP_ENC_KEY:?TOTP_ENC_KEY is required — openssl rand -base64 32}
      TOTP_ISSUER: ${TOTP_ISSUER:-APEX Platform}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      # --- Initial admin bootstrap (consumed by node seed-admin.js, not server.js) ---
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-APEX Administrator}
      # --- Optional: Cisco Control Hub integration ---
      CISCO_CLIENT_ID: ${CISCO_CLIENT_ID:-}
      CISCO_CLIENT_SECRET: ${CISCO_CLIENT_SECRET:-}
      CISCO_ORG_ID: ${CISCO_ORG_ID:-}
      CISCO_PERSONAL_TOKEN: ${CISCO_PERSONAL_TOKEN:-}
      CISCO_MOCK_MODE: ${CISCO_MOCK_MODE:-true}
    volumes:
      - apex-uploads:/app/uploads
      # RSA keypair for RS256 access tokens. Mounted read-only — the
      # container process cannot modify or overwrite the private key.
      - ./secrets:/app/secrets:ro
      # Mount external CA certs here when DB_SSL_CA points inside this directory:
      # - ./certs:/etc/apex/certs:ro
    networks:
      - apex-net

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: apex-web:latest
    container_name: apex-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-8080}:80"
    networks:
      - apex-net

volumes:
  apex-db-data:
  apex-uploads:

networks:
  apex-net:
    driver: bridge
