name: Secret scan

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scanner can audit the whole git log on push,
          # not just the most recent commit. PRs get the diff range from
          # GitHub automatically.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use the repo's .gitleaks.toml allowlist (CHANGE_ME_*,
          # <placeholder>, JWT header examples, lockfile hashes).
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_LICENSE is only required for org-account scans on
          # paid plans; personal repos use the free tier.

  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Run pre-commit on all files
        # Mirrors what a developer's local pre-commit hook does, so the
        # CI failure mode matches the dev failure mode exactly.
        uses: pre-commit/action@v3.0.1
