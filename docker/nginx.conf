# APEX nginx site configuration
# Serves the static app shell + Vue bundle and reverse-proxies /api to the
# backend service (resolved via Docker network DNS).

upstream apex_backend {
    server backend:3001;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    # Security headers (helmet also sets equivalents on API responses)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;

    # Lightweight health endpoint for Docker healthcheck / load balancers
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Vue bundle: long cache, immutable (cache-busted via ?v= query in index.html)
    location /vue/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location /images/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Proxy backend API
    location /api/ {
        proxy_pass http://apex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Backend health passthrough
    location = /health {
        proxy_pass http://apex_backend/health;
    }

    # App shell - never cache index.html so version bumps take effect immediately
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /index.html =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri /index.html;
    }
}
