# APEX nginx site configuration
# Serves the static app shell + Vue bundle and reverse-proxies /api to the
# backend service (resolved via Docker network DNS).
#
# IMPORTANT: nginx's `add_header` directive does NOT inherit across location
# blocks. If a child location uses any add_header, ALL parent add_header
# directives are dropped. So security headers must be repeated in every
# location that needs them. The `_security_headers` block below is included
# from each location to keep this DRY.

upstream apex_backend {
    server backend:3001;
    keepalive 32;
}

# -----------------------------------------------------------------------------
# Reusable security headers - included from every static-content location.
#
# These mirror what helmet sets on backend API responses. /api/ inherits
# them from helmet through the proxy, so we don't duplicate them on the
# proxy location.
# -----------------------------------------------------------------------------
# (nginx does not have a true macro system, so this lives in the docker
# image alongside this file via the COPY in Dockerfile.web.)

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 25m;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Lightweight health endpoint for Docker healthcheck / load balancers.
    # No security headers needed - this is a fixed plain-text response.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Vue bundle: long cache, immutable (cache-busted via ?v= query in index.html)
    location /vue/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.sheetjs.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com https://unpkg.com; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        try_files $uri =404;
    }

    location /images/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        try_files $uri =404;
    }

    # Proxy backend API. The backend uses helmet to set its own CSP and
    # security headers, so we do not duplicate them here - that would
    # potentially conflict with what the backend sends.
    location /api/ {
        proxy_pass http://apex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Backend health passthrough
    location = /health {
        proxy_pass http://apex_backend/health;
    }

    # App shell - never cache index.html so version bumps take effect immediately
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.sheetjs.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com https://unpkg.com; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        # HSTS - uncomment if this container is fronted directly by TLS.
        # Otherwise set HSTS at the upstream TLS terminator.
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        try_files /index.html =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.sheetjs.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com https://unpkg.com; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        # HSTS - uncomment if this container is fronted directly by TLS.
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        try_files $uri /index.html;
    }
}
