# Pre-commit hooks for APEX — catch secrets and obvious mistakes before
# they leave the developer's machine.
#
# One-time setup after cloning:
#
#   pip install pre-commit          # or: pipx install pre-commit
#   pre-commit install               # installs the git hook
#   pre-commit run --all-files       # scan the whole tree once
#
# The hooks run automatically on every `git commit`. To bypass for a specific
# commit (DO NOT do this for secrets), use `git commit --no-verify`.
#
# Managed secrets tooling:
#   - gitleaks          primary secret scanner, uses .gitleaks.toml for config
#   - detect-private-key blocks PEM/SSH private keys
#   - check-added-large-files avoids accidentally committing DB dumps etc.
#
# If you trigger a false positive, add an entry to .gitleaks.toml's
# allowlist instead of disabling the hook.

default_install_hook_types: [pre-commit, commit-msg]

repos:
  # --- Primary secret scanner ----------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # --- Ancillary hygiene hooks ---------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Blocks accidental commit of SSH / PEM / PGP private keys.
      - id: detect-private-key
      # Catches ad-hoc `<<<<<<<` merge-conflict markers in source.
      - id: check-merge-conflict
      # Refuses files larger than 2 MB — usually means someone committed a
      # DB dump, log file, or build artifact. Override with `--maxkb=...`
      # on a case-by-case basis if you have a legitimate large file.
      - id: check-added-large-files
        args: ['--maxkb=2048']
      # Enforces LF on text files where .gitattributes doesn't already.
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: '\.(bat|cmd|ps1)$'
      # YAML / JSON parse check — catches config syntax errors before they
      # reach CI.
      - id: check-yaml
      - id: check-json
        exclude: '(tsconfig.*\.json|\.vscode/.*\.json)$'
      # Strip trailing whitespace + ensure files end with a newline.
      - id: trailing-whitespace
        exclude: '\.(md|snap)$'
      - id: end-of-file-fixer
        exclude: 'vue/apex-rooms\.iife\.js$'
